# Render Blueprint — free Python web service for the stateful video demo.
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo.
# (Vercel serverless is not suitable: the env session is in-memory on one process.)
#
# After deploy, open the service URL; the UI and /api/demo/* share the same origin.

services:
  - type: web
    name: financial-triage-video-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.video_demo_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
